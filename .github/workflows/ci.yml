name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install
      - run: npm run test:backend
        env:
          DBHOST_TEST: ${{ secrets.DBHOST_TEST }}
          TOKEN_SECRET: ${{ secrets.TOKEN_SECRET }}

  frontend-tests:
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: cd frontend && npm install
      - run: cd frontend && npm test -- --watch=false

  deploy:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests] # only deploy if tests pass
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies and build
        run: |
          npm install
          npm run build          # adjust if your frontend/backend have separate builds
          cd frontend
          npm install
          npm run build

      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          curl -X POST \
            -H "Accept: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"serviceId":"'"$RENDER_SERVICE_ID"'"}' \
            https://api.render.com/deploy/srv-dummyid